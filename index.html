<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="/styles/index.css" />
    <title>Character counter</title>
  </head>
  <body>
    <main class="container">
      <nav class="nav">
        <img
          src="./assets/images/logo-dark-theme.svg"
          alt="Logo"
          class="nav-logo"
        />
        <button class="btn-theme-toggle">
          <img
            src="./assets/images/icon-sun.svg"
            alt="toggle theme"
            class="theme-toggle_icon"
          />
        </button>
      </nav>
      <header id="header-container">
        <h1>Analyze your text in real-time.</h1>
      </header>
      <section id="main-section-container">
        <textarea
          class="input-textarea"
          placeholder="Start typing here… (or paste your text)"
        ></textarea>

        <div class="options-container">
          <div class="exclude-spaces-container">
            <div class="checkbox-container">
              <input type="checkbox" id="exclude-spaces" class="checkbox" />
              <label for="exclude-spaces">Exclude spaces</label>
            </div>
            <div class="checkbox-container">
              <input
                type="checkbox"
                id="set-character-limit"
                class="checkbox"
              />
              <label for="set-character-limit">Set Character Limit</label>
            </div>
          </div>
          <p>Approx. reading time: 0 minute</p>
        </div>
      </section>

      <section id="stat-density-container">
        <div class="stat-card-container">
          <div class="stat-card">
            <div>
              <p>278</p>
              <p>Total Characters</p>
            </div>
            <div>
              <img
                src="./assets/images/pattern-character-count.svg"
                alt="density icon"
                class="stat-card-icon"
              />
            </div>
          </div>
          <div class="stat-card">
            <div>
              <p>39</p>
              <p>Word Count</p>
            </div>
            <div>
              <img
                src="./assets/images/pattern-word-count.svg"
                alt="density icon"
                class="stat-card-icon"
              />
            </div>
          </div>
          <div class="stat-card">
            <div>
              <p>04</p>
              <p>Sentence Count</p>
            </div>
            <div>
              <img
                src="./assets/images/pattern-sentence-count.svg"
                alt="density icon"
                class="stat-card-icon"
              />
            </div>
          </div>
        </div>

        <div id="letter-density-container">
          <h2>Letter Density</h2>
          <div class="list-container">
            <div class="list-item">
              <div class="letter-label">E</div>
              <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: 16.06%"></div>
              </div>
              <div class="letter-percentage">40 (16.06%)</div>
            </div>
            <div class="list-item">
              <div class="letter-label">I</div>
              <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: 11.65%"></div>
              </div>
              <div class="letter-percentage">29 (11.65%)</div>
            </div>
            <div class="list-item">
              <div class="letter-label">T</div>
              <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: 11.24%"></div>
              </div>
              <div class="letter-percentage">28 (11.24%))</div>
            </div>
            <div class="list-item">
              <div class="letter-label">O</div>
              <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: 8.84%"></div>
              </div>
              <div class="letter-percentage">22 (8.84%)</div>
            </div>
            <div class="list-item">
              <div class="letter-label">N</div>
              <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: 8.84%"></div>
              </div>
              <div class="letter-percentage">21 (8.43%)</div>
            </div>
          </div>
          <div id="see-more-btn">
            <p>See more</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
